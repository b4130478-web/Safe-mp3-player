name: Build React Android App

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem

    - name: Build React Production Package
      env:
        CI: false
      run: |
        npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Sync Capacitor Mobile Framework
      run: |
        npx @capacitor/cli sync android

    - name: Build Android Release APK
      run: |
        cd android
        chmod +x gradlew
        echo "org.gradle.java.home=$JAVA_HOME_21_X64" >> gradle.properties
        ./gradlew assembleRelease --no-daemon

    - name: Sign APK File
      run: |
        cd android/app/build/outputs/apk/release/
        sudo apt-get install -y apksigner
        keytool -genkeypair -v -keystore release.p12 -storetype pkcs12 -alias my-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=App, O=App, C=US"
        apksigner sign --ks release.p12 --ks-pass pass:123456 --out Safe-MP3-Player-Signed.apk app-release-unsigned.apk

    - name: Upload Pre-Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Safe-MP3-Player-APK
        path: android/app/build/outputs/apk/release/Safe-MP3-Player-Signed.apk
